# [OVERRIDE] Physical Environment (TurtleBot)
# 
# Description: Defines precise lab boundaries, hardware ROS 2 topics, 
#   Lidar offsets, and strict physical braking thresholds.

# ====================================================================
# Motion Model Node (Dead Reckoning)
# ====================================================================
motion_model:
  ros__parameters:
    # Source of raw wheel odometry.
    odom_topic: "/odom"

    # TF frame names. Must match what the robot driver publishes.
    frames:
      odom_frame: "odom"
      base_link_frame: "base_link"

    # Lidar mounting offset (base_link -> lidar). Default (0, 0, 0) works
    # for both the Unity sim and the TurtleBot since the lidar is aligned
    # with base_link. Set non-zero only if your hardware mounts it offset.
    lidar:
      x_offset: 0.0      # metres forward from base_link
      y_offset: 0.0      # metres left of base_link
      yaw_offset: 1.570  # radians CCW from base_link forward


# ====================================================================
# Occupancy Grid Mapper Node
# ====================================================================
occupancy_grid_mapper:
  ros__parameters:
    # 2D laser scan input.
    scan_topic: "/scan"

    # [PURELY VISUAL] How often the occupancy grid (uncorrected) is
    # published, in Hz.
    # Larger: smoother updates in RViz, more bandwidth/CPU.
    # Smaller: laggier visualisation, less load.
    map_publish_rate: 1.0

    occupancy_grid:
      # Cell size in metres. Drives every other grid dimension.
      # Larger: coarser map, less RAM, A* path is blockier.
      # Smaller: finer map, RAM usage scales as 1/resolution^2.
      resolution: 0.025
      # [WARN] Resolution will need to be increased unless using 'c_engine:=cpp'!

      # Grid size in cells. Total covered area = width * resolution metres.
      # Larger: covers more terrain, more memory.
      # Smaller: smaller world, may clip off-grid scans.
      width: 300
      height: 300

      # World coordinate of the grid's (0, 0) cell. Together with width /
      # height / resolution, defines which world region the grid covers.
      # Increase: grid window shifts in the +x / +y direction.
      # Decrease: grid window shifts in the opposite direction.
      origin_x: -1.0
      origin_y: -1.0

    # See motion_model.lidar above for offsets.
    lidar:
      x_offset: 0.0
      y_offset: 0.0
      yaw_offset: 1.570


# ====================================================================
# SLAM Estimator Node (SLAM)
# ====================================================================
slam_estimator:
  ros__parameters:
    scan_topic: "/scan"
    odom_topic: "/odom"

    scan_matcher:
      # Step size when sweeping the search window.
      # Larger: fewer candidates -> faster but coarser localisation.
      # Smaller: finer score peak -> better corrections but quadratic CPU
      #   in xy and linear in theta.
      resolution_x: 0.025
      resolution_y: 0.025
      resolution_theta: 0.02

      # Side length of the local rasterised grid used when scoring scans.
      # Larger: matches over a larger area -> better in open spaces, more
      #   memory and CPU per match.
      # Smaller: cheaper but loses overlap on long shifts.
      local_grid_size: 1000

      # Cell size of the local matching grid, in metres.
      # (occupancy_grid.resolution / 2 = Super-Sampling)
      # Larger: coarser correlation surface, faster but less precise.
      # Smaller: finer score peaks, more memory and CPU.
      local_grid_resolution: 0.025
      
    # See motion_model.lidar above for offsets.
    lidar:
      x_offset: 0.0
      y_offset: 0.0
      yaw_offset: 1.570

    # SLAM keeps its own copy of the occupancy grid for the corrected map.
    # See occupancy_grid_mapper.occupancy_grid above for what each value
    # means; values must match across nodes.
    occupancy_grid:
      resolution: 0.025
      width: 300
      height: 300
      origin_x: -1.0
      origin_y: -1.0


# ====================================================================
# Global Mapper Node (SLAM)
# ====================================================================
global_mapper:
  ros__parameters:
    scan_topic: "/scan"
    odom_topic: "/odom"

    # See motion_model.lidar above for offsets.
    lidar:
      x_offset: 0.0
      y_offset: 0.0
      yaw_offset: 1.570

    # See occupancy_grid_mapper.occupancy_grid above for each value.
    occupancy_grid:
      resolution: 0.025
      width: 300
      height: 300
      origin_x: -1.0
      origin_y: -1.0


# ====================================================================
# A* Path Planner
# ====================================================================
planner_node:
  ros__parameters:
    scan_topic: "/scan"

    # See motion_model.lidar above for offsets.
    lidar:
      x_offset: 0.0
      y_offset: 0.0
      yaw_offset: 1.570

    costmaps:
      global:
        # Number of grid cells to inflate every obstacle by. Acts as the
        # safety margin between the planner's idea of "free" and the rover's
        # actual footprint.
        # Larger: paths stay further from obstacles; narrow gaps may
        #   inflate shut and become "no path".
        # Smaller: paths hug walls; rover may scrape corners.
        inflation_radius_cells: 16.0

      local:
        # Number of grid cells to inflate every obstacle by.
        # Tighter radius favours getting closer to obstacles for local planning.
        inflation_radius_cells: 12.0
        
        # Ignore obstacles beyond range in local costmap (meters).
        max_obstacle_range: 2.5
        
        # Ignore obstacles within range to avoid self-hits in local costmap (meters).
        min_obstacle_range: 0.14

        # Size of the ROI box (m) for local dynamic avoidance.
        # Larger: more of the map is updated with new obstacles, but more CPU.
        # Smaller: is faster (less CPU) and focuses on immediate surroundings.
        window_size: 3.6

    # Hardcoded mission goal (Kevin's location), in the map frame.
    # Increase x: goal moves east. Decrease x: goal moves west.
    # Increase y: goal moves north. Decrease y: goal moves south.
    goal:
      x: 3.0
      y: 1.02
      tolerance: 0.10


# ====================================================================
# Pure-Pursuit Navigator
# ====================================================================
navigator_node:
  ros__parameters:
    scan_topic: "/scan"
    cmd_vel_topic: "/cmd_vel_unstamped"

    # See motion_model.lidar above for offsets.
    lidar:
      x_offset: 0.0
      y_offset: 0.0
      yaw_offset: 1.570
    
    safety:
      # Soft collision braking distance in metres. The threshold where the 
      # robot begins its recovery maneuver.
      # Larger: earlier recovery attempts, keeping a safer standoff distance.
      # Smaller: allows getting closer to dynamic obstacles before taking action.
      collision_brake_dist: 0.25
      
      # Hard emergency braking distance in metres. The absolute final perimeter
      # before physical impact.
      # Larger: guarantees zero collisions, but might permanently trap the robot.
      # Smaller: only triggers when millimeters away from physical impact (e.g., 5cm).
      # [WARN] Must be greater than 'occupancy_grid.min_range'!
      emergency_brake_dist: 0.19
      
      # Width of the safety field of view, in radians.
      # 1.57 rad is approx 90 degrees (45 degrees left and right of center).
      # Larger: wider peripheral protection, but might trigger on walls during turns.
      # Smaller: narrow tunnel vision, risks clipping objects with the wheels/sides.
      forward_cone_angle: 1.57

      # Maximum turn speed (rad/s) allowed during a soft collision recovery spin.
      # Low values ensure the robot doesn't swing its physical chassis into the object.
      recovery_spin_v: 0.15

    control:
      # Control loop rate in Hz. Twist commands are republished at this
      # rate.
      # Larger: smoother control, more CPU.
      # Smaller: jerkier control, less load.
      rate_hz: 15.0

      # Pure-pursuit lookahead distance in metres. The controller picks
      # the path point this far ahead of the rover and drives a circular
      # arc to it.
      # Larger: gentle, sweeping turns; cuts corners.
      # Smaller: aggressive, tight tracking of the path; can oscillate.
      # lookahead: 1.5
      lookahead_min: 0.3        # Tight lookahead for slow, sharp corners (m)
      lookahead_max: 1.0        # Wide lookahead for fast straights (m)
      lookahead_ratio: 2.0      # LOWERED: Smoother scaling to prevent rapid snapping

      # Maximum forward speed in m/s.
      # Larger: faster mission completion but stresses scan matching and
      #   widens turning radius at the controller.
      # Smaller: slower but safer; better localisation and tighter turns.
      max_linear_v: 0.5

      # Maximum angular speed in rad/s.
      # Larger: tighter turns possible at speed, harder on scan matching
      #   (rotation is the failure mode).
      # Smaller: rover spins more slowly; may struggle on sharp corners.
      max_angular_v: 0.4

      # Maximum linear acceleration
      max_linear_a: 0.6

      # Maximum angular acceleration
      max_angular_a: 1.0

      # [WARN] Velocity and Acceleration will need to be reduced if not
      #        using 'c_engine:=cpp'!

      # Distance to the goal at which the navigator declares arrival
      # and stops.
      # Larger: stops further from the exact goal; more forgiving.
      # Smaller: stops closer; may overshoot or miss in noisy odometry.
      goal_tolerance: 0.10